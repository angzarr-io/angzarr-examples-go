# Go example applications for local development
# Deploy with: helm upgrade --install angzarr ./deploy/helm/angzarr -f ./deploy/helm/angzarr/values-go.yaml -n angzarr --create-namespace
#
# =============================================================================
# Port Scheme - Go (50100-50199, 3 ports per component)
# =============================================================================
# Per-component: +0 gRPC, +1 debug, +2 visualization
#
# agg-order:              50100-50102  (gRPC: 50100)
# agg-inventory:          50103-50105  (gRPC: 50103)
# agg-fulfillment:        50106-50108  (gRPC: 50106)
# sag-order-fulfillment:  50118-50120  (gRPC: 50118)
# sag-order-inventory:    50121-50123  (gRPC: 50121)
# sag-fulfillment-inv:    50124-50126  (gRPC: 50124)
# prj-inventory:          50133-50135  (gRPC: 50133)
# pmg-fulfillment:        50139-50141  (gRPC: 50139)
# =============================================================================

# Global settings
global:
  security:
    allowInsecureImages: true

replicaCount: 1

# Angzarr sidecar images (using local registry)
images:
  aggregate:
    repository: ghcr.io/angzarr-io/angzarr-aggregate
    pullPolicy: IfNotPresent
    tag: "latest"
  projector:
    repository: ghcr.io/angzarr-io/angzarr-projector
    pullPolicy: IfNotPresent
    tag: "latest"
  saga:
    repository: ghcr.io/angzarr-io/angzarr-saga
    pullPolicy: IfNotPresent
    tag: "latest"
  processManager:
    repository: ghcr.io/angzarr-io/angzarr-process-manager
    pullPolicy: IfNotPresent
    tag: "latest"
  stream:
    repository: ghcr.io/angzarr-io/angzarr-stream
    pullPolicy: IfNotPresent
    tag: "latest"
  gateway:
    repository: ghcr.io/angzarr-io/angzarr-grpc-gateway
    pullPolicy: IfNotPresent
    tag: "latest"
  log:
    repository: ghcr.io/angzarr-io/angzarr-log
    pullPolicy: IfNotPresent
    tag: "latest"

# Minimal resources for local dev
resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "250m"

applicationResources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

# Storage configuration
# Requires: helm install angzarr-db ./deploy/k8s/helm/postgres -n angzarr
storage:
  type: postgres
  postgres:
    uri: "postgres://angzarr:angzarr-dev@angzarr-db-rw:5432/angzarr"

# Messaging configuration
# Requires: helm install angzarr-mq ./deploy/k8s/helm/rabbitmq -n angzarr
messaging:
  type: "amqp"
  amqp:
    enabled: true
    url: "amqp://guest:guest@angzarr-mq:5672/%2F"

# AMQP event bus
amqp:
  enabled: true
  url: "amqp://guest:guest@angzarr-mq:5672/%2F"

# External secrets disabled for local dev
externalSecrets:
  enabled: false

# Central infrastructure services
infrastructure:
  stream:
    enabled: true
    replicas: 1
    port: 1340
    projectorPort: 1345
    serviceType: NodePort
    nodePort: 31340
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "250m"

  gateway:
    enabled: true
    replicas: 1
    port: 8080
    serviceType: NodePort
    nodePort: 30084
    grpcTarget: "player-aggregate:1310"
    descriptorConfigMap: "gateway-descriptor"
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "250m"

  log:
    enabled: true
    replicas: 1
    port: 50051
    resources:
      requests:
        memory: "32Mi"
        cpu: "25m"
      limits:
        memory: "128Mi"
        cpu: "100m"

# Business applications - each gets angzarr as sidecar
applications:
  business:
    # Poker Domain Aggregates (Go: 50200-50299)
    - name: poker-player
      image:
        repository: ghcr.io/angzarr-io/examples-go-agg-player
        tag: "latest"
        pullPolicy: IfNotPresent
      domain: "player"
      port: 50201

    - name: poker-table
      image:
        repository: ghcr.io/angzarr-io/examples-go-agg-table
        tag: "latest"
        pullPolicy: IfNotPresent
      domain: "table"
      port: 50202

    - name: poker-hand
      image:
        repository: ghcr.io/angzarr-io/examples-go-agg-hand
        tag: "latest"
        pullPolicy: IfNotPresent
      domain: "hand"
      port: 50203

  sagas:
    - name: saga-table-hand
      image:
        repository: ghcr.io/angzarr-io/examples-go-saga-table-hand
        tag: "latest"
        pullPolicy: IfNotPresent
      domain: "saga-table-hand"
      port: 50211
      topics:
        - "table.*"

    - name: saga-table-player
      image:
        repository: ghcr.io/angzarr-io/examples-go-saga-table-player
        tag: "latest"
        pullPolicy: IfNotPresent
      domain: "saga-table-player"
      port: 50212
      topics:
        - "table.*"

    - name: saga-hand-table
      image:
        repository: ghcr.io/angzarr-io/examples-go-saga-hand-table
        tag: "latest"
        pullPolicy: IfNotPresent
      domain: "saga-hand-table"
      port: 50213
      topics:
        - "hand.*"

    - name: saga-hand-player
      image:
        repository: ghcr.io/angzarr-io/examples-go-saga-hand-player
        tag: "latest"
        pullPolicy: IfNotPresent
      domain: "saga-hand-player"
      port: 50214
      topics:
        - "hand.*"

  projectors:
    - name: prj-output
      image:
        repository: ghcr.io/angzarr-io/examples-go-prj-output
        tag: "latest"
        pullPolicy: IfNotPresent
      domain: "output"
      port: 50290
      topics:
        - "player.*"
        - "table.*"
        - "hand.*"

  processManagers:
    - name: pmg-hand-flow
      image:
        repository: ghcr.io/angzarr-io/examples-go-pmg-hand-flow
        tag: "latest"
        pullPolicy: IfNotPresent
      domain: "pmg-hand-flow"
      port: 50291
      topics:
        - "player.*"
        - "table.*"
        - "hand.*"

# Service configuration
service:
  type: NodePort
  aggregatePort: 1310
  queryPort: 1315
  nodePort:
    enabled: true
    aggregate: 31310

debug:
  enabled: false

logging:
  level: info

autoscaling:
  enabled: false

reloader:
  enabled: false

serviceDiscovery:
  headless: false
