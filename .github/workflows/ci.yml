name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    container: ghcr.io/angzarr-io/angzarr-go:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build
        run: just build

      - name: Test (unit)
        run: just test-unit

      - name: Lint
        run: just lint

      - name: Format check
        run: |
          gofmt -l . | tee /tmp/gofmt.out
          test ! -s /tmp/gofmt.out
