name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/angzarr-io/examples-go
  COORDINATOR_VERSION: latest
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  # =============================================================================
  # STAGE 1: BUILD & TEST
  # =============================================================================

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/angzarr-io/angzarr-go:0.1.3
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build
        run: just -f justfile.container build

      - name: Test (unit)
        run: just -f justfile.container test-unit

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/local/bin v1.64.8

      - name: Lint
        run: just -f justfile.container lint

      - name: Format check
        run: |
          gofmt -l . | tee /tmp/gofmt.out
          test ! -s /tmp/gofmt.out

  # =============================================================================
  # STAGE 2: BUILD & PUSH IMAGES
  # =============================================================================

  build-images:
    name: Build Image (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        target:
          - agg-player
          - agg-table
          - agg-hand
          - saga-table-hand
          - saga-table-player
          - saga-hand-table
          - saga-hand-player
          - pmg-hand-flow
          - prj-output
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            echo "tags=${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:pr-${PR_NUM}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "tags=${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:${SHORT_SHA},${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image for acceptance tests
        if: github.event_name == 'pull_request'
        run: docker save -o /tmp/${{ matrix.target }}.tar "${{ steps.tags.outputs.tags }}"

      - name: Upload image artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.target }}
          path: /tmp/${{ matrix.target }}.tar
          retention-days: 1

  # =============================================================================
  # STAGE 3: ACCEPTANCE TESTS
  # =============================================================================

  acceptance-test:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Generate image tag
        id: tag
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            echo "tag=pr-${PR_NUM}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: angzarr-test
          config: deploy/kind/cluster.yaml
          node_image: kindest/node:v1.31.0
          wait: 120s

      - name: Create namespace
        run: kubectl create namespace angzarr-test --dry-run=client -o yaml | kubectl apply -f -

      - name: Create image pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --namespace=angzarr-test \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl patch serviceaccount default -n angzarr-test \
            -p '{"imagePullSecrets": [{"name": "ghcr-pull-secret"}]}' || true

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Helm registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull and load coordinator images
        run: |
          COORDINATOR_IMAGES=(
            "ghcr.io/angzarr-io/angzarr-aggregate:${{ env.COORDINATOR_VERSION }}"
            "ghcr.io/angzarr-io/angzarr-saga:${{ env.COORDINATOR_VERSION }}"
            "ghcr.io/angzarr-io/angzarr-projector:${{ env.COORDINATOR_VERSION }}"
            "ghcr.io/angzarr-io/angzarr-process-manager:${{ env.COORDINATOR_VERSION }}"
            "ghcr.io/angzarr-io/angzarr-stream:${{ env.COORDINATOR_VERSION }}"
            "ghcr.io/angzarr-io/angzarr-grpc-gateway:${{ env.COORDINATOR_VERSION }}"
            "ghcr.io/angzarr-io/angzarr-log:${{ env.COORDINATOR_VERSION }}"
          )
          for img in "${COORDINATOR_IMAGES[@]}"; do
            echo "Pulling $img..."
            docker pull "$img"
            kind load docker-image "$img" --name angzarr-test
          done

      - name: Download image artifacts
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v4
        with:
          path: /tmp/images
          pattern: image-*

      - name: Load example images into Kind (PR)
        if: github.event_name == 'pull_request'
        run: |
          for tarball in /tmp/images/image-*/*.tar; do
            echo "Loading $tarball..."
            kind load image-archive "$tarball" --name angzarr-test
          done

      - name: Pull and load example images (push)
        if: github.event_name != 'pull_request'
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          TARGETS=(
            agg-player
            agg-table
            agg-hand
            saga-table-hand
            saga-table-player
            saga-hand-table
            saga-hand-player
            pmg-hand-flow
            prj-output
          )
          for target in "${TARGETS[@]}"; do
            img="${{ env.IMAGE_PREFIX }}-${target}:${TAG}"
            echo "Pulling $img..."
            docker pull "$img"
            kind load docker-image "$img" --name angzarr-test
          done

      - name: Deploy infrastructure
        run: |
          echo "Deploying PostgreSQL..."
          helm upgrade --install angzarr-db oci://ghcr.io/angzarr-io/charts/angzarr-db-postgres-simple \
            --namespace angzarr-test \
            --wait --timeout 2m
          echo "Deploying RabbitMQ..."
          helm upgrade --install angzarr-mq oci://ghcr.io/angzarr-io/charts/angzarr-mq-rabbitmq-simple \
            --namespace angzarr-test \
            --wait --timeout 3m
          echo "Infrastructure deployed"

      - name: Create gateway descriptor configmap
        run: |
          cd angzarr-project/proto
          buf build -o /tmp/types.bin
          cd ../..
          kubectl create configmap gateway-descriptor \
            --from-file=types.bin=/tmp/types.bin \
            --namespace angzarr-test

      - name: Deploy applications
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          COORD_VER: ${{ env.COORDINATOR_VERSION }}
        run: |
          helm upgrade --install poker oci://ghcr.io/angzarr-io/charts/angzarr \
            --version 0.5.1 \
            -f deploy/k8s/helm/values.yaml \
            -f deploy/k8s/helm/values-ci.yaml \
            --set images.aggregate.tag="${COORD_VER}" \
            --set images.saga.tag="${COORD_VER}" \
            --set images.projector.tag="${COORD_VER}" \
            --set images.processManager.tag="${COORD_VER}" \
            --set images.stream.tag="${COORD_VER}" \
            --set images.gateway.tag="${COORD_VER}" \
            --set images.log.tag="${COORD_VER}" \
            --set "applications.business[0].image.tag=${TAG}" \
            --set "applications.business[1].image.tag=${TAG}" \
            --set "applications.business[2].image.tag=${TAG}" \
            --set "applications.sagas[0].image.tag=${TAG}" \
            --set "applications.sagas[1].image.tag=${TAG}" \
            --set "applications.sagas[2].image.tag=${TAG}" \
            --set "applications.sagas[3].image.tag=${TAG}" \
            --set "applications.processManagers[0].image.tag=${TAG}" \
            --set "applications.projectors[0].image.tag=${TAG}" \
            --namespace angzarr-test \
            --wait --timeout 5m

          echo "Deployment complete. Checking status:"
          kubectl get pods -n angzarr-test

      - name: Smoke test
        run: |
          echo "Waiting for gateway pod..."
          kubectl wait --for=condition=ready pod -l angzarr.io/service=grpc-gateway \
            -n angzarr-test --timeout=180s || {
            echo "Gateway pod not ready, checking status..."
            kubectl get pods -n angzarr-test
            exit 1
          }

          echo "Waiting for stream pod (optional)..."
          kubectl wait --for=condition=ready pod -l angzarr.io/service=stream \
            -n angzarr-test --timeout=60s || {
            echo "Stream pod not ready — continuing without stream (not required for acceptance tests)"
            kubectl get pods -n angzarr-test
          }

          echo "All pods ready. Port-forwarding gateway..."
          kubectl port-forward -n angzarr-test svc/poker-angzarr-grpc-gateway 9084:8080 &
          PF_PID=$!
          trap "kill $PF_PID 2>/dev/null || true" EXIT
          sleep 5

          echo "Connectivity check (gateway)..."
          curl -sf http://localhost:9084/ || echo "Gateway responded (non-JSON root is expected)"

          echo "Checking all pods are running..."
          FAILED=$(kubectl get pods -n angzarr-test --no-headers | grep -v Running | grep -v Completed || true)
          if [ -n "$FAILED" ]; then
            echo "Some pods are not running:"
            echo "$FAILED"
            exit 1
          fi

          echo "Smoke test passed - all pods running, gateway reachable"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: go.sum

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Generate proto code
        run: buf generate

      - name: Download Go dependencies
        run: go mod download

      - name: Wait for player aggregate
        run: |
          echo "Waiting for player aggregate pod..."
          kubectl wait --for=condition=ready pod -l angzarr.io/domain=player \
            -n angzarr-test --timeout=180s || {
            echo "Player aggregate pod not ready, checking status..."
            kubectl get pods -n angzarr-test
            exit 1
          }

      - name: Run acceptance tests
        env:
          PLAYER_URL: "localhost:1310"
          TABLE_URL: "localhost:1311"
          HAND_URL: "localhost:1312"
        run: |
          kubectl port-forward -n angzarr-test svc/player-aggregate 1310:1310 &
          kubectl port-forward -n angzarr-test svc/table-aggregate 1311:1310 &
          kubectl port-forward -n angzarr-test svc/hand-aggregate 1312:1310 &

          # Wait for port-forwards to establish
          for port in 1310 1311 1312; do
            for i in $(seq 1 15); do
              if nc -z localhost $port 2>/dev/null; then
                echo "Port $port ready"
                break
              fi
              [ $i -eq 15 ] && echo "WARNING: Port $port not ready after 15s"
              sleep 1
            done
          done

          # Verify pods are healthy
          echo "=== Pod status before tests ==="
          kubectl get pods -n angzarr-test -o wide
          echo ""

          # Check pod logs for startup errors
          for domain in player table hand; do
            echo "=== $domain aggregate logs (last 5 lines) ==="
            kubectl logs -n angzarr-test -l angzarr.io/domain=$domain --tail=5 --all-containers 2>/dev/null || true
          done

          go test -v -tags=acceptance -count=1 -timeout=600s ./tests/

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n angzarr-test -o wide
          echo ""
          echo "=== Recent Events ==="
          kubectl get events -n angzarr-test --sort-by='.lastTimestamp' | tail -30
          echo ""
          echo "=== Pod Logs ==="
          for pod in $(kubectl get pods -n angzarr-test -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs $pod -n angzarr-test --all-containers --tail=50 || true
          done

  # =============================================================================
  # SUMMARY
  # =============================================================================

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [test, build-images, acceptance-test]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Images | ${{ needs.build-images.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Acceptance Tests | ${{ needs.acceptance-test.result }} |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build-images.result }}" != "success" ] || \
             [ "${{ needs.acceptance-test.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
