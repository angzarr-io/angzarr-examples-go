version: v2
inputs:
  - directory: angzarr-project/proto  # Core and example protos from submodule
    exclude_paths:
      - angzarr-project/proto/examples/ai_sidecar.proto
plugins:
  - remote: buf.build/protocolbuffers/go
    out: angzarr-client-go/proto
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: angzarr-client-go/proto
    opt: paths=source_relative
