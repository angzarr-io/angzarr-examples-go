version: v2
inputs:
  - module: buf.build/angzarr/angzarr
  - directory: angzarr-project/proto  # Local poker domain protos
    exclude_paths:
      - angzarr-project/proto/examples/ai_player.proto
      - angzarr-project/proto/examples/ai_sidecar.proto
plugins:
  - remote: buf.build/protocolbuffers/go
    out: proto
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: proto
    opt: paths=source_relative
